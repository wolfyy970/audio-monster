name: Bug report
description: Report a reproducible Audio Monster problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Audio Monster. Do not include private article text, URLs, signing material, or security vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Paste…
        3. Observe…
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Build or revision
      description: App version, release, or commit SHA.
  - type: input
    id: environment
    attributes:
      label: macOS and Mac model
      placeholder: macOS 15.x, MacBook Pro M3
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Redact URLs, article content, usernames, paths, certificates, and other private data.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This is not a security vulnerability.
          required: true
