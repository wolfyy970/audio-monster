name: Feature request
description: Propose a focused product improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need is not met today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the workflow and why it fits a menu-bar reading tool.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or simpler options.
  - type: textarea
    id: impact
    attributes:
      label: Platform and privacy impact
      description: Note any new network access, permissions, dependencies, storage, or hosted services.
